<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#1d9e75">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Daily Facts">
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/png" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<title>Daily Facts</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #faf9f5; color: #1a1a1a; min-height: 100vh;
    padding: 2rem 1.25rem calc(2rem + env(safe-area-inset-bottom));
    display: flex; flex-direction: column; align-items: center;
  }
  .wrap { width: 100%; max-width: 480px; }
  .date-block { text-align: center; margin-bottom: 2rem; }
  .weekday { font-size: 14px; color: #6b6b6b; text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 6px; }
  .bigdate { font-size: 38px; font-weight: 600; line-height: 1.1; }
  .year { font-size: 16px; color: #9a9a9a; margin-top: 6px; }
  .card { border-radius: 16px; padding: 1.1rem 1.3rem; margin-bottom: 14px; }
  .card .label { font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
  .card .yr { font-weight: 700; }
  .card .fact { font-size: 16px; line-height: 1.55; }
  .history { background: #faeeda; } .history .label { color: #854f0b; } .history .fact { color: #633806; }
  .science { background: #e1f5ee; } .science .label { color: #0f6e56; } .science .fact { color: #085041; }
  .random  { background: #eeedfe; } .random .label { color: #3c3489; } .random .fact { color: #26215c; }
  .muted { opacity: 0.55; font-style: italic; }
  button {
    width: 100%; margin-top: 1.25rem; padding: 16px; font-size: 16px; font-weight: 600;
    font-family: inherit; color: #fff; background: #1d9e75; border: none; border-radius: 14px;
    cursor: pointer; transition: transform 0.05s, background 0.2s;
  }
  button:active { transform: scale(0.98); background: #0f6e56; }
  button:disabled { opacity: 0.5; }
  @media (prefers-color-scheme: dark) {
    body { background: #1a1a18; color: #f0efe8; }
    .weekday { color: #9a988f; } .year { color: #6b6b66; }
    .history { background: #4a2e08; } .history .label { color: #fac775; } .history .fact { color: #f9e3c5; }
    .science { background: #04342c; } .science .label { color: #5dcaa5; } .science .fact { color: #c5f0e2; }
    .random  { background: #1f1a40; } .random .label { color: #afa9ec; } .random .fact { color: #d9d6f5; }
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="date-block">
    <div class="weekday" id="weekday"></div>
    <div class="bigdate" id="bigdate"></div>
    <div class="year" id="year"></div>
  </div>
  <div class="card history">
    <div class="label">On this day in history</div>
    <div class="fact" id="fact-history"><span class="muted">Loading...</span></div>
  </div>
  <div class="card science">
    <div class="label">Science &amp; discovery</div>
    <div class="fact" id="fact-science"><span class="muted">Loading...</span></div>
  </div>
  <div class="card random">
    <div class="label">Born on this day</div>
    <div class="fact" id="fact-random"><span class="muted">Loading...</span></div>
  </div>
  <button id="refresh">New facts</button>
</div>
<script>
(function(){
  var now = new Date();
  var days = ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
  var months = ["January","February","March","April","May","June","July","August","September","October","November","December"];
  document.getElementById("weekday").textContent = days[now.getDay()];
  document.getElementById("bigdate").textContent = months[now.getMonth()] + " " + now.getDate();
  document.getElementById("year").textContent = now.getFullYear();

  var mm = String(now.getMonth() + 1).padStart(2, "0");
  var dd = String(now.getDate()).padStart(2, "0");

  var SCIENCE_WORDS = ["scien","discover","invent","physic","chemi","biolog","astronom","space","planet","telescope","vaccine","medic","math","comput","electric","atom","gene","dna","nobel","experiment","engineer","spacecraft","satellite","rocket","laborator","theory","element","radio","x-ray","microscop","surgery","particle","quantum"];

  var data = { history: [], science: [], births: [], allEvents: [] };

  function isScience(text){
    var t = text.toLowerCase();
    for (var i = 0; i < SCIENCE_WORDS.length; i++){ if (t.indexOf(SCIENCE_WORDS[i]) !== -1) return true; }
    return false;
  }
  function pick(arr){ return arr.length ? arr[Math.floor(Math.random()*arr.length)] : null; }

  function render(){
    var h = pick(data.history.length ? data.history : data.allEvents);
    var s = pick(data.science.length ? data.science : data.allEvents);
    var b = pick(data.births);
    setCard("fact-history", h);
    setCard("fact-science", s);
    setCard("fact-random", b);
  }

  function setCard(id, item){
    var el = document.getElementById(id);
    if (!item){ el.innerHTML = '<span class="muted">No fact found for today.</span>'; return; }
    el.innerHTML = '<span class="yr">' + escapeHtml(String(item.year)) + '</span> &mdash; ' + escapeHtml(item.text);
  }
  function escapeHtml(s){ var d = document.createElement("div"); d.textContent = s; return d.innerHTML; }

  function fail(){
    ["fact-history","fact-science","fact-random"].forEach(function(id){
      document.getElementById(id).innerHTML = '<span class="muted">Couldn\u2019t load today\u2019s facts. Check your internet connection and tap New facts.</span>';
    });
  }

  function load(){
    var btn = document.getElementById("refresh");
    btn.disabled = true;
    var url = "https://api.wikimedia.org/feed/v1/wikipedia/en/onthisday/all/" + mm + "/" + dd;
    fetch(url, { headers: { "Api-User-Agent": "DailyFactsApp/1.0 (personal use)" } })
      .then(function(r){ if (!r.ok) throw new Error("bad response"); return r.json(); })
      .then(function(json){
        var events = (json.events || []).concat(json.selected || []);
        data.allEvents = events.map(function(e){ return { year: e.year, text: e.text }; });
        data.history = data.allEvents.filter(function(e){ return !isScience(e.text); });
        data.science = data.allEvents.filter(function(e){ return isScience(e.text); });
        data.births = (json.births || []).map(function(e){ return { year: e.year, text: e.text }; });
        render();
        btn.disabled = false;
      })
      .catch(function(){ fail(); btn.disabled = false; });
  }

  document.getElementById("refresh").addEventListener("click", function(){
    if (data.allEvents && data.allEvents.length) render();
    else load();
  });
  load();
})();
</script>
</body>
</html>
